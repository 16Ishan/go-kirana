spring:
  application:
    name: go-kirana-products
  datasource:
    url: jdbc:postgresql://localhost:5432/go_kirana
    username: root
    password: root
  h2:
    console:
      enabled: true
  jpa:
    show-sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080

app:
  pagination:
    max-size: 100